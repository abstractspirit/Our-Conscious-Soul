<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Conscious Soul</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: "Georgia", serif;
      color: #f5f1e6;

      /* háttérkép */
      background-image: url("https://images.unsplash.com/photo-1500375592092-40eb2168fd21");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* sötét réteg a háttér fölé */
    .overlay {
      background: rgba(20, 30, 25, 0.55);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    .content {
      max-width: 700px;
    }

    h1 {
      font-size: 48px;
      letter-spacing: 2px;
      color: #d8cbb2; /* bézs */
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #b9c7b0; /* halvány zöld */
      margin-top: 20px;
    }

    .tagline {
      margin-top: 30px;
      font-style: italic;
      color: #e7dfcf;
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div class="content">
      <h1>Our Conscious Soul</h1>

      <p>
        Exploring the deeper layers of consciousness beyond the ego.
        Where silence, awareness, and truth meet.
      </p>

      <div class="tagline">
        “The real journey is inward.”
      </div>
    </div>
  </div>
</body>
</html>
